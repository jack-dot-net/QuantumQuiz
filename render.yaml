services:
  - type: web
    name: quantumquiz
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /healthz
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
